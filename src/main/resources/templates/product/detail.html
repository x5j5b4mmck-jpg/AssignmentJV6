<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${item.name} + ' - Chi tiết sản phẩm'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container mt-5">
        <div class="row bg-white p-4 shadow-sm rounded">
            <div class="col-md-5 text-center">
                <img th:src="@{|/assets/images/${item.image}|}" class="img-fluid rounded" alt="Chi tiết" style="max-height: 400px;">
            </div>
            
            <div class="col-md-7">
                <h2 th:text="${item.name}" class="text-primary"></h2>
                <h4 class="text-danger mt-3" th:text="'Giá: ' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></h4>
                
                <ul class="list-group list-group-flush mt-4 mb-4">
                    <li class="list-group-item"><b>Mã sản phẩm:</b> <span th:text="${item.id}"></span></li>
                    <li class="list-group-item"><b>Loại hàng:</b> <span th:text="${item.category.name}"></span></li>
                    <li class="list-group-item"><b>Ngày nhập:</b> <span th:text="${#dates.format(item.createDate, 'dd-MM-yyyy')}"></span></li>
                    <li class="list-group-item"><b>Trạng thái:</b> <span th:text="${item.available ? 'Còn hàng' : 'Hết hàng'}" class="badge bg-success"></span></li>
                </ul>

                <button class="btn btn-primary btn-lg mt-2" th:attr="ng-click=@{|cart.add(${item.id})|}">
                    🛒 Thêm vào giỏ hàng
                </button>
                <a href="/product/list" class="btn btn-secondary btn-lg mt-2">⬅ Tiếp tục mua sắm</a>
            </div>
        </div>
    </main>
</body>
</html>
