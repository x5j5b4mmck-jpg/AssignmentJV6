<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm - FPT Polytechnic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container mt-4">
        <h2 class="mb-4 text-primary">DANH SÁCH SẢN PHẨM</h2>
        
        <div class="row">
            <div th:each="p : ${items}" class="col-md-3 col-sm-6 mb-4">
                <div class="card h-100 shadow-sm">
                    <a th:href="@{|/product/detail/${p.id}|}">
                        <img th:src="@{|/assets/images/${p.image}|}" class="card-img-top" alt="Hình ảnh sản phẩm">
                    </a>
                    <div class="card-body text-center">
                        <h5 class="card-title">
                            <a th:href="@{|/product/detail/${p.id}|}" th:text="${p.name}" class="text-decoration-none text-dark"></a>
                        </h5>
                        <p class="card-text text-danger fw-bold" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></p>
                    </div>
                    <div class="card-footer bg-white border-0 text-center pb-3">
                        <a th:href="@{|/product/detail/${p.id}|}" class="btn btn-outline-info">Chi tiết</a>
                        <button class="btn btn-primary" th:attr="ng-click=@{|cart.add(${p.id})|}">🛒 Thêm giỏ</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
